[plugin]
id = "study_companion"
name = "Study Companion"
description = "An adaptive study companion that can classify the screen, generate questions, evaluate answers, explain concepts, and summarize sessions."
short_description = "OCR, tutoring, and session summaries for study sessions."
keywords = ["study", "ocr", "tutor", "concept", "learning"]
version = "0.1.0"
type = "plugin"
entry = "plugin.plugins.study_companion:StudyCompanionPlugin"

[plugin.author]
name = "N.E.K.O Team"

[plugin.sdk]
recommended = ">=0.1.0,<0.2.0"
supported = ">=0.1.0,<0.3.0"

[plugin.store]
enabled = true

[plugin.database]
enabled = false

[plugin_state]
backend = "memory"

[plugin_runtime]
enabled = true
auto_start = false

[study]
default_mode = "companion"
language = "zh-CN"
history_limit = 50

[llm]
llm_call_timeout_seconds = 30

[ocr_reader]
enabled = true
backend_selection = "rapidocr"
capture_backend = "auto"
tesseract_path = ""
install_manifest_url = ""
install_target_dir = ""
install_timeout_seconds = 300
languages = "chi_sim+jpn+eng"
left_inset_ratio = 0.03
right_inset_ratio = 0.03
top_ratio = 0.0
bottom_inset_ratio = 0.0

[rapidocr]
enabled = true
install_target_dir = ""
engine_type = "onnxruntime"
lang_type = "ch"
model_type = "mobile"
ocr_version = "PP-OCRv4"

[fsrs]
retention_target = 0.90
auto_optimize_interval_days = 30

[knowledge_contribution]
opt_in = false
min_sample_count = 3

[doc_export]
enabled = false
pdf_backend = "reportlab"
default_style = "neko"
xmind_enabled = false

[plugin.ui]
enabled = true

[[plugin.ui.guide]]
id = "study-panel"
title = "Study Panel"
entry = "surfaces/study_panel.tsx"
permissions = ["state:read"]

[[plugin.ui.guide]]
id = "knowledge-map"
title = "Knowledge Map"
entry = "surfaces/knowledge_map.tsx"
permissions = ["state:read", "action:call"]

[[plugin.ui.guide]]
id = "knowledge-contribution-settings"
title = "Knowledge Contribution Settings"
entry = "surfaces/knowledge_contribution_settings.tsx"
permissions = ["state:read", "action:call", "config:write"]

[[plugin.ui.guide]]
id = "note-exporter"
title = "Note Exporter"
entry = "surfaces/note_exporter.tsx"
permissions = ["state:read", "action:call"]

[[plugin.ui.guide]]
id = "quickstart"
title = "Study Companion Quickstart"
entry = "surfaces/quickstart.tsx"
permissions = ["state:read"]

[plugin.i18n]
default_locale = "zh-CN"
locales_dir = "i18n"

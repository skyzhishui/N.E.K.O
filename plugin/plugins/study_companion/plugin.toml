[plugin]
id = "study_companion"
name = "Study Companion"
description = "An adaptive study companion that can classify the screen, generate questions, evaluate answers, explain concepts, and summarize sessions."
short_description = "OCR, tutoring, and session summaries for study sessions."
keywords = ["study", "ocr", "tutor", "concept", "learning"]
version = "0.1.0"
type = "plugin"
entry = "plugin.plugins.study_companion:StudyCompanionPlugin"

[plugin.author]
name = "N.E.K.O Team"

[plugin.sdk]
recommended = ">=0.1.0,<0.2.0"
supported = ">=0.1.0,<0.3.0"

[plugin.store]
enabled = true

[plugin.database]
enabled = false

[plugin_state]
backend = "memory"

[plugin_runtime]
enabled = true
auto_start = false

[study]
default_mode = "companion"
language = "zh-CN"
history_limit = 50

[study.pomodoro]
focus_minutes = 25
short_break_minutes = 5
long_break_minutes = 15
long_break_interval = 4
allow_skip_break = true
allow_custom_duration = true

[study.supervision]
enabled = true
remind_interval_minutes = 10
inactivity_timeout_minutes = 5
allow_disable_by_chat = true

[study.checkin]
streak_timezone = "local"
makeup_window_days = 3
auto_derive_from_session = true

[llm]
llm_call_timeout_seconds = 30

[ocr_reader]
enabled = true
backend_selection = "rapidocr"
capture_backend = "auto"
tesseract_path = ""
install_manifest_url = ""
install_target_dir = ""
install_timeout_seconds = 300
languages = "chi_sim+jpn+eng"
left_inset_ratio = 0.03
right_inset_ratio = 0.03
top_ratio = 0.0
bottom_inset_ratio = 0.0

[rapidocr]
enabled = true
install_target_dir = ""
engine_type = "onnxruntime"
lang_type = "ch"
model_type = "mobile"
ocr_version = "PP-OCRv4"

[fsrs]
retention_target = 0.90
auto_optimize_interval_days = 30

[knowledge_contribution]
opt_in = false
min_sample_count = 3

[doc_export]
enabled = false
pdf_backend = "reportlab"
default_style = "neko"
xmind_enabled = false

[plugin.ui]
enabled = true

[[plugin.ui.guide]]
id = "study-panel"
title = "Study Panel"
entry = "surfaces/study_panel.tsx"
permissions = ["state:read"]

[[plugin.ui.guide]]
id = "knowledge-map"
title = "Knowledge Map"
entry = "surfaces/knowledge_map.tsx"
permissions = ["state:read", "action:call"]

[[plugin.ui.guide]]
id = "knowledge-contribution-settings"
title = "Knowledge Contribution Settings"
entry = "surfaces/knowledge_contribution_settings.tsx"
permissions = ["state:read", "action:call", "config:write"]

[[plugin.ui.guide]]
id = "memory-deck-list"
title = "Memory Decks"
entry = "surfaces/memory_deck_list.tsx"
permissions = ["state:read", "action:call"]

[[plugin.ui.guide]]
id = "word-review"
title = "Word Review"
entry = "surfaces/word_review.tsx"
permissions = ["state:read", "action:call"]

[[plugin.ui.guide]]
id = "passage-recitation"
title = "Passage Recitation"
entry = "surfaces/passage_recitation.tsx"
permissions = ["state:read", "action:call"]

[[plugin.ui.guide]]
id = "memory-importer"
title = "Memory Importer"
entry = "surfaces/memory_importer.tsx"
permissions = ["state:read", "action:call"]

[[plugin.ui.guide]]
id = "due-review-panel"
title = "Due Reviews"
entry = "surfaces/due_review_panel.tsx"
permissions = ["state:read", "action:call"]

[[plugin.ui.guide]]
id = "note-exporter"
title = "Note Exporter"
entry = "surfaces/note_exporter.tsx"
permissions = ["state:read", "action:call"]

[[plugin.ui.guide]]
id = "habit-dashboard"
title = "Habit Dashboard"
entry = "surfaces/habit_dashboard.tsx"
permissions = ["state:read", "action:call"]

[[plugin.ui.guide]]
id = "pomodoro-panel"
title = "Pomodoro Panel"
entry = "surfaces/pomodoro_panel.tsx"
permissions = ["state:read", "action:call"]

[[plugin.ui.guide]]
id = "daily-goal-editor"
title = "Daily Goal Editor"
entry = "surfaces/daily_goal_editor.tsx"
permissions = ["state:read", "action:call"]

[[plugin.ui.guide]]
id = "session-summary"
title = "Session Summary"
entry = "surfaces/session_summary.tsx"
permissions = ["state:read", "action:call"]

[[plugin.ui.guide]]
id = "quickstart"
title = "Study Companion Quickstart"
entry = "surfaces/quickstart.tsx"
permissions = ["state:read"]

[plugin.i18n]
default_locale = "zh-CN"
locales_dir = "i18n"

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Study Companion</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="study-shell">
      <section class="study-toolbar" aria-label="Study companion controls">
        <div>
          <h1 data-i18n="ui.title">Study Companion</h1>
          <p id="statusLine" data-i18n="ui.status.starting">Starting...</p>
        </div>
        <div class="toolbar-actions">
          <button id="refreshBtn" type="button" data-i18n="ui.button.refresh">Refresh</button>
          <button id="ocrBtn" type="button" data-i18n="ui.button.ocr">OCR</button>
        </div>
      </section>

      <section class="mode-strip" data-i18n-aria-label="ui.label.mode">
        <button id="modeCompanionBtn" type="button" data-mode="companion" data-i18n="status.mode.companion">Companion</button>
        <button id="modeInteractiveBtn" type="button" data-mode="interactive" data-i18n="status.mode.interactive">Interactive</button>
        <button id="modeTeachingBtn" type="button" data-mode="teaching" data-i18n="status.mode.teaching">Teaching</button>
      </section>

      <section class="study-meta" aria-label="Study state">
        <div class="meta-item">
          <span data-i18n="ui.label.screen">Screen</span>
          <strong id="screenType">-</strong>
        </div>
        <div class="meta-item">
          <span data-i18n="ui.label.question">Question</span>
          <strong id="questionStatus">-</strong>
        </div>
        <div class="meta-item">
          <span data-i18n="ui.label.answer">Answer</span>
          <strong id="evaluationStatus">-</strong>
        </div>
      </section>

      <section class="memory-panel" aria-live="polite">
        <div class="section-heading">
          <h2 data-i18n="ui.memory.title">Memory Deck</h2>
          <span id="memoryDeckStatus">-</span>
        </div>
        <div class="memory-inputs">
          <label class="input-label" for="memoryFrontInput" data-i18n="ui.memory.front">Front</label>
          <textarea id="memoryFrontInput" spellcheck="true" data-i18n-placeholder="ui.memory.front_placeholder" placeholder="Question or prompt"></textarea>
          <label class="input-label" for="memoryBackInput" data-i18n="ui.memory.back">Back</label>
          <textarea id="memoryBackInput" spellcheck="true" data-i18n-placeholder="ui.memory.back_placeholder" placeholder="Answer or recall target"></textarea>
        </div>
        <div class="action-row">
          <button id="memoryRefreshBtn" type="button" data-i18n="ui.button.refresh_deck">Refresh Deck</button>
          <button id="memoryAddBtn" type="button" data-i18n="ui.button.save_card">Save Card</button>
        </div>
        <div id="memoryDueCard" class="memory-card">-</div>
        <div class="memory-review-actions" aria-label="Memory review ratings">
          <button type="button" data-memory-rating="again">Again</button>
          <button type="button" data-memory-rating="hard">Hard</button>
          <button type="button" data-memory-rating="good">Good</button>
          <button type="button" data-memory-rating="easy">Easy</button>
        </div>
      </section>

      <section class="study-workspace">
        <label class="input-label" for="studyInput" data-i18n="ui.label.text">Text</label>
        <textarea id="studyInput" spellcheck="true" placeholder="Paste a concept, problem statement, or OCR text here." data-i18n-placeholder="ui.placeholder.input"></textarea>
        <div class="action-row">
          <button id="generateQuestionBtn" type="button" data-i18n="ui.button.generate_question">Generate Question</button>
          <button id="explainBtn" type="button" data-i18n="ui.button.explain">Explain</button>
        </div>
      </section>

      <section class="question-panel" aria-live="polite">
        <h2 data-i18n="ui.label.question">Question</h2>
        <pre id="questionText"></pre>
        <label class="input-label" for="answerInput" data-i18n="ui.label.answer">Answer</label>
        <textarea id="answerInput" spellcheck="true"></textarea>
        <div class="action-row">
          <button id="evaluateAnswerBtn" type="button" data-i18n="ui.button.evaluate_answer">Evaluate Answer</button>
          <button id="summarizeBtn" type="button" data-i18n="ui.button.summarize_session">Summarize Session</button>
        </div>
      </section>

      <section class="reply-panel" aria-live="polite">
        <h2 data-i18n="ui.label.reply">Reply</h2>
        <pre id="replyText"></pre>
      </section>
    </main>
    <script src="./i18n.js"></script>
    <script src="./main.js"></script>
  </body>
</html>

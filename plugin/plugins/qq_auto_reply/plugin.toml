[plugin]
name = "QQ 自动回复"
description = "读取 QQ 消息并根据权限自动回复。通过 OneBot 协议连接 QQ，支持多级权限管理和 AI 对话。"
short_description = "读取 QQ 消息并根据权限自动回复。无需主动调用。"
keywords = ["qq", "onebot", "auto-reply", "chat", "permission"]
passive = true
version = "0.5.0"
id = "qq_auto_reply"
type = "plugin"
entry = "plugin.plugins.qq_auto_reply:QQAutoReplyPlugin"

[plugin.author]
name = "N.E.K.O Team"

[plugin.sdk]
recommended = ">=0.1.0,<0.2.0"
supported = ">=0.1.0,<0.3.0"

[plugin.i18n]
default_locale = "zh-CN"
locales_dir = "i18n"

[plugin.store]
enabled = false

[plugin.ui]
enabled = true

[[plugin.ui.panel]]
id = "main"
title = "Hello QQ"
entry = "static/index.html"
context = "qq_auto_reply"
permissions = ["state:read", "action:call"]

[[plugin.ui.guide]]
id = "quickstart"
title = "快速开始"
entry = "doc/README.md"
permissions = ["state:read"]

[plugin_runtime]
enabled = true
auto_start = false